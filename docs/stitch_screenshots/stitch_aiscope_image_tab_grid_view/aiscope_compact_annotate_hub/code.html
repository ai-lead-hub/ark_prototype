<!DOCTYPE html><html class="dark" lang="en"><head>

<style>
        .kinetic-grid {
            background-image:

                linear-gradient(to bottom, rgba(247, 147, 26, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }
        .atmospheric-blur {
            filter: blur(120px);
            background: radial-gradient(circle, rgba(234, 88, 12, 0.08) 0%, transparent 70%);
        }
        .glass-context {
            background: rgba(30, 32, 36, 0.6);

<body class="bg-background text-on-surface font-body overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Kinetic Vault Environment -->
<div class="fixed inset-0 kinetic-grid z-0"></div>
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] atmospheric-blur z-0"></div>
<!-- Top AppBar -->
<header class="fixed top-0 left-0 right-0 h-16 flex justify-between items-center px-6 z-50">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors active:scale-95" style="">
<span class="material-symbols-outlined text-on-surface" style="">arrow_back</span>
</button>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<h1 class="font-headline font-bold text-sm tracking-tight uppercase text-primary-container" style="">Image Lab</h1>
</div>
<div class="flex items-center gap-6">
<div class="flex flex-col items-end">
<span class="font-headline font-bold text-xs uppercase tracking-wider text-on-surface-variant" style="">Campaign Q1</span>
<div class="flex items-center gap-1.5 mt-0.5">
<span class="material-symbols-outlined text-[14px] text-tertiary" style="">toll</span>
<span class="font-label text-[11px] font-bold text-tertiary" style="">142.8</span>
</div>
</div>
</div>
</header>
<!-- SideNavBar (Left Tool Rail) -->
<nav class="fixed left-4 top-1/2 -translate-y-1/2 w-14 bg-surface-container-low/40 backdrop-blur-xl border border-outline-variant/10 rounded-2xl flex flex-col items-center py-6 gap-6 z-50 shadow-2xl">
<button class="p-2 bg-electric-cyan/10 text-electric-cyan rounded-xl shadow-[0_0_15px_rgba(12,158,234,0.3)] transition-all border border-electric-cyan/20" title="Annotate" style="">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">edit</span>
</button>
<button class="p-2 text-slate-500 hover:text-white hover:bg-surface-container-high rounded-xl transition-all" title="Crop" style="">
<span class="material-symbols-outlined" style="">crop</span>
</button>
<button class="p-2 text-slate-500 hover:text-white hover:bg-surface-container-high rounded-xl transition-all" title="Inpaint" style="">
<span class="material-symbols-outlined" style="">brush</span>
</button>
<button class="p-2 text-slate-500 hover:text-white hover:bg-surface-container-high rounded-xl transition-all" title="Prompt" style="">
<span class="material-symbols-outlined" style="">terminal</span>
</button>
<button class="p-2 text-slate-500 hover:text-white hover:bg-surface-container-high rounded-xl transition-all" title="Vary" style="">
<span class="material-symbols-outlined" style="">auto_awesome</span>
</button>
<button class="p-2 text-slate-500 hover:text-white hover:bg-surface-container-high rounded-xl transition-all" title="Upscale" style="">
<span class="material-symbols-outlined" style="">zoom_out_map</span>
</button>
</nav>

<main class="fixed inset-0 flex items-center justify-center p-20 z-10">

<div class="relative max-w-5xl max-h-[768px] rounded-2xl overflow-hidden shadow-[0_40px_100px_rgba(0,0,0,0.8)] border border-outline-variant/20">

<circle cx="500" cy="420" fill="rgba(12,158,234,0.15)" r="30" stroke="#0C9EEA" stroke-dasharray="4 2" stroke-width="2"></circle>
<text fill="#0C9EEA" font-family="JetBrains Mono" font-size="12" font-weight="bold" text-anchor="middle" x="500" y="380">REFINE TEXTURE</text>
<defs>
<marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="0" refY="3.5">
<polygon fill="#0C9EEA" points="0 0, 10 3.5, 0 7"></polygon>
</marker>
</defs>
<line marker-end="url(#arrowhead)" stroke="#0C9EEA" stroke-width="2" x1="600" x2="680" y1="500" y2="550"></line>
</svg>
</div>
<!-- Floating Image Metadata -->
<div class="absolute -bottom-10 left-0 flex items-center gap-4 px-2">
<div class="flex items-center gap-2">
<span class="font-label text-[10px] uppercase text-on-surface-variant/60 tracking-widest" style="">Resolution</span>
<span class="font-label text-[10px] text-on-surface-variant font-bold" style="">2048 x 2048</span>
</div>
<div class="w-[1px] h-3 bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="font-label text-[10px] uppercase text-on-surface-variant/60 tracking-widest" style="">Seed</span>
<span class="font-label text-[10px] text-on-surface-variant font-bold" style="">849201174</span>
</div>
</div>
</div>
</main>
<!-- Center Bottom Overlay Compact Control Bar -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
<div class="bg-surface-container-low/80 backdrop-blur-2xl border border-outline-variant/10 rounded-full p-1.5 flex items-center gap-1 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)]">
<!-- Active Tool -->
<div class="flex items-center gap-2.5 px-4 h-9 bg-surface-container-highest/50 rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-electric-cyan text-[18px]" style="">edit</span>
<span class="font-headline text-[11px] font-bold uppercase tracking-wider text-on-surface" style="">Annotate</span>
</div>
<div class="h-6 w-[1px] bg-outline-variant/20 mx-1"></div>

<div class="flex items-center gap-1">

<div class="relative group/pop">
<button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container-highest text-on-surface-variant hover:text-electric-cyan transition-all" style="">

<button class="w-6 h-6 rounded-full bg-error hover:scale-110 transition-transform" style=""></button>
<button class="w-6 h-6 rounded-full bg-white hover:scale-110 transition-transform" style=""></button>
</div>
<div class="w-2 h-2 glass-context border-t-0 border-l-0 rotate-45 absolute -bottom-1 left-1/2 -translate-x-1/2"></div>
</div>
</div>

<div class="relative group/pop">
<button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container-highest text-on-surface-variant hover:text-electric-cyan transition-all" style="">

<div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 hidden group-hover/pop:block">
<div class="glass-context rounded-2xl p-4 min-w-[140px] flex flex-col gap-2">

<div class="flex items-center gap-3">
<input class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-electric-cyan" type="range" value="2">
<span class="font-label text-[10px] text-white w-6 text-center" style="">2px</span>
</div>
</div>
<div class="w-2 h-2 glass-context border-t-0 border-l-0 rotate-45 absolute -bottom-1 left-1/2 -translate-x-1/2"></div>
</div>
</div>
<!-- Shape Selector -->
<div class="relative group/pop">
<button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container-highest text-on-surface-variant hover:text-electric-cyan transition-all" style="">
<span class="material-symbols-outlined text-[20px]" style="">shapes</span>
</button>
<!-- Context Panel -->
<div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 hidden group-hover/pop:block">
<div class="glass-context rounded-2xl p-1.5 flex gap-1">
<button class="p-2 text-white/60 hover:text-white rounded-lg hover:bg-white/10 transition-colors" style="">
<span class="material-symbols-outlined text-[20px]" style="">check_box_outline_blank</span>
</button>
<button class="p-2 bg-electric-cyan text-white rounded-lg shadow-[0_0_10px_rgba(12,158,234,0.3)]" style="">

</button>
<button class="p-2 text-white/60 hover:text-white rounded-lg hover:bg-white/10 transition-colors" style="">
<span class="material-symbols-outlined text-[20px]" style="">trending_flat</span>
</button>
</div>
<div class="w-2 h-2 glass-context border-t-0 border-l-0 rotate-45 absolute -bottom-1 left-1/2 -translate-x-1/2"></div>
</div>
</div>
<!-- Text Tool -->

<span class="material-symbols-outlined text-[20px]" style="">text_fields</span>
</button>
</div>
<div class="h-6 w-[1px] bg-outline-variant/20 mx-1"></div>

<div class="flex items-center gap-1 pl-1">
<button class="px-4 h-9 rounded-full font-label text-[11px] font-bold text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-colors uppercase" style="">Clear</button>
<button class="bg-electric-cyan text-white px-5 h-9 rounded-full font-label text-[11px] font-black uppercase tracking-tight flex items-center gap-2 shadow-[0_0_20px_rgba(12,158,234,0.3)] transition-all hover:brightness-110 active:scale-95" style="">
<span class="" style="">SAVE</span>
<span class="material-symbols-outlined text-[16px]" style="">done_all</span>
</button>
</div>
</div>
</div>

<div class="fixed top-20 right-8 z-20 w-52 flex flex-col gap-4">
<div class="bg-surface-container-low/40 backdrop-blur-md p-4 rounded-xl border border-outline-variant/10">
<div class="flex justify-between items-center mb-4">
<span class="font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant" style="">Edited Versions</span>
<span class="material-symbols-outlined text-[14px] text-on-surface-variant" style="">history</span>

<div class="space-y-1.5">

<div class="group flex items-center justify-between p-2 bg-electric-cyan/10 border border-electric-cyan/30 rounded-lg cursor-pointer transition-all hover:bg-electric-cyan/20">
<span class="font-label text-[11px] text-electric-cyan font-bold tracking-tight" style="">VERSION_03</span>
<div class="flex items-center gap-1">
<button class="w-6 h-6 flex items-center justify-center rounded bg-electric-cyan/20 text-electric-cyan hover:bg-electric-cyan/40" title="Save" style="">
<span class="material-symbols-outlined text-[14px]" style="">save</span>
</button>
<button class="w-6 h-6 flex items-center justify-center rounded bg-electric-cyan/20 text-electric-cyan hover:bg-electric-cyan/40" title="Compare" style="">
<span class="material-symbols-outlined text-[14px] font-bold" style="">compare</span>
</button>
</div>
</div>
<!-- Version Item: v2 -->
<div class="group flex items-center justify-between p-2 hover:bg-surface-container-highest/50 border border-transparent hover:border-outline-variant/20 rounded-lg cursor-pointer transition-all">
<span class="font-label text-[11px] text-on-surface-variant/80 font-bold tracking-tight" style="">VERSION_02</span>
<div class="flex items-center gap-1">
<button class="w-6 h-6 flex items-center justify-center rounded text-on-surface-variant/40 hover:text-on-surface-variant hover:bg-surface-container-highest" title="Save" style=""><span class="material-symbols-outlined text-[14px]" style="">save</span></button>
<button class="w-6 h-6 flex items-center justify-center rounded text-on-surface-variant/40 hover:text-on-surface-variant hover:bg-surface-container-highest" title="Compare" style=""><span class="material-symbols-outlined text-[14px]" style="">compare</span></button>
</div>
</div>
<!-- Version Item: v1 -->
<div class="group flex items-center justify-between p-2 hover:bg-surface-container-highest/50 border border-transparent hover:border-outline-variant/20 rounded-lg cursor-pointer transition-all">
<span class="font-label text-[11px] text-on-surface-variant/80 font-bold tracking-tight" style="">VERSION_01</span>
<div class="flex items-center gap-1">
<button class="w-6 h-6 flex items-center justify-center rounded text-on-surface-variant/40 hover:text-on-surface-variant hover:bg-surface-container-highest" title="Save" style=""><span class="material-symbols-outlined text-[14px]" style="">save</span></button>
<button class="w-6 h-6 flex items-center justify-center rounded text-on-surface-variant/40 hover:text-on-surface-variant hover:bg-surface-container-highest" title="Compare" style=""><span class="material-symbols-outlined text-[14px]" style="">compare</span></button>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Right Workspace Actions -->
<div class="fixed bottom-6 right-6 z-20">
<button class="p-2 text-on-surface-variant/40 hover:text-primary-container transition-colors" style="">
<span class="material-symbols-outlined text-[20px]" style="">info</span>
</button>
</div>
