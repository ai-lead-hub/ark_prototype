services:
  app:
    build: .
    ports:
      - "8800:8800"
    volumes:
      - ./data:/data
    environment:
      - FILE_API_PORT=8800
      - FILE_STORAGE_ROOT=/data
      - FILE_API_TOKEN=${FILE_API_TOKEN}
      - FILE_API_REQUIRE_TOKEN=${FILE_API_REQUIRE_TOKEN:-true}
      - FILE_API_CORS_ORIGIN=${FILE_API_CORS_ORIGIN:-http://localhost:5188}
      - FILE_MAX_SIZE_MB=${FILE_MAX_SIZE_MB:-256}
      - FILE_ENABLE_CLIENT_LOG_ENDPOINT=${FILE_ENABLE_CLIENT_LOG_ENDPOINT:-false}
      - FILE_TRASH_CLEAR_ON_START=${FILE_TRASH_CLEAR_ON_START:-false}
      - FILE_REQUIRE_META_DB=${FILE_REQUIRE_META_DB:-false}
      - FREEPIK_API_KEY=${FREEPIK_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8800/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
