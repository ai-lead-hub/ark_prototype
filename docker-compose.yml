services:
  app:
    build: .
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
      - ./.env.local:/app/.env.local:ro
      - ./.env.server:/app/.env.server:ro
    environment:
      - FILE_API_PORT=8787
      - FILE_STORAGE_ROOT=/data
      - FILE_API_TOKEN=${FILE_API_TOKEN:-devtoken}
      - FILE_API_CORS_ORIGIN=${FILE_API_CORS_ORIGIN:-*}
      - FILE_MAX_SIZE_MB=${FILE_MAX_SIZE_MB:-1024}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8787/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
